# =============================================================================
# MTChat Helm Chart - Default Values
# =============================================================================

# -- API (mtchat-rust backend)
api:
  replicaCount: 2

  image:
    repository: pohodnya/mtchat
    tag: ""  # Defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Pod annotations (e.g. for Prometheus scraping)
  podAnnotations: {}

  # Additional environment variables
  extraEnv: []

# -- Ingress
ingress:
  enabled: false
  className: ""  # e.g. "nginx"
  annotations: {}
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    # nginx.ingress.kubernetes.io/websocket-services: mtchat-api
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: chat.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: mtchat-tls
  #    hosts:
  #      - chat.example.com

# -- PostgreSQL
postgresql:
  # Set to false to use an external database
  enabled: true

  image:
    repository: postgres
    tag: "17-alpine"

  auth:
    database: mtchat
    username: mtchat
    # password is set via existingSecret or generated
    password: ""
    existingSecret: ""
    secretKeys:
      userPasswordKey: password

  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Connection settings for external database
  # Only used when postgresql.enabled=false
  external:
    host: ""
    port: 5432
    database: mtchat
    username: mtchat
    existingSecret: ""
    secretKeys:
      passwordKey: password

# -- Redis
redis:
  # Set to false to use an external Redis
  enabled: true

  image:
    repository: redis
    tag: "7-alpine"

  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

  # Connection settings for external Redis
  external:
    host: ""
    port: 6379
    existingSecret: ""
    secretKeys:
      urlKey: redis-url

# -- MinIO (S3-compatible storage)
minio:
  # Set to false to use external S3
  enabled: true

  image:
    repository: minio/minio
    tag: "latest"

  rootUser: mtchat-admin
  rootPassword: ""
  existingSecret: ""

  bucket: mtchat-attachments

  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # External S3 configuration (used when minio.enabled=false)
  external:
    endpoint: ""
    publicEndpoint: ""
    bucket: mtchat-attachments
    region: us-east-1
    existingSecret: ""
    secretKeys:
      accessKeyId: access-key-id
      secretAccessKey: secret-access-key

# -- Application secrets. All keys are injected into a Secret with the
# same capitalised names (DATABASE_URL, JWT_SECRET, etc.).
# Pass the whole block via:
#   helm upgrade --set-json secret='{"databaseUrl":"...","jwtSecret":"..."}' ...
secret:
  databaseUrl: ""
  redisUrl: ""
  jwtSecret: ""
  adminApiToken: ""
  webhookSecret: ""
  s3AccessKeyId: ""
  s3SecretAccessKey: ""

# -- Reference an existing Secret instead of creating one.
# When set, the chart reads all secret values from that Secret
# (e.g. produced by External Secrets Operator / Vault Agent).
existingSecret: ""

# -- Password for the embedded PostgreSQL (used when postgresql.enabled=true).
postgresqlPassword: ""

# -- JWT authentication for Chat API
jwt:
  # Enable JWT validation on Chat API routes. When false, the Chat API
  # falls back to identifying users via the ?user_id=<id> query parameter.
  enabled: false
  # Claim name in the JWT payload that holds the user identifier.
  # Default `sub` matches the JWT-standard subject claim. Override when
  # the host application encodes the user id under a different claim,
  # e.g. `user_id`, `userId`, `id`.
  userIdClaim: "sub"

# -- CORS settings
cors:
  # Allowed origins (comma-separated or "*" for all)
  allowedOrigins: "*"
  # Allowed methods
  allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
  # Allowed headers
  allowedHeaders: "*"
  # Allow credentials (cookies, auth headers)
  allowCredentials: false
  # Preflight cache max age (seconds)
  maxAge: 3600

# -- Webhooks (optional)
webhooks:
  url: ""
  secret: ""

# -- Job queue settings
jobs:
  notificationDelaySecs: 30
  notificationConcurrency: 2
  archiveCron: "0 */5 * * * *"
  archiveAfterSecs: 259200

# -- Sentry (optional)
sentry:
  dsn: ""

# -- Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

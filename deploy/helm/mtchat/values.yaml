# =============================================================================
# MTChat Helm Chart - Default Values
# =============================================================================

# -- API (mtchat-rust backend)
api:
  replicaCount: 2

  image:
    repository: pohodnya/mtchat
    tag: ""  # Defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Pod annotations (e.g. for Prometheus scraping)
  podAnnotations: {}

  # Additional environment variables
  extraEnv: []

# -- Ingress
ingress:
  enabled: false
  className: ""  # e.g. "nginx"
  annotations: {}
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    # nginx.ingress.kubernetes.io/websocket-services: mtchat-api
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: chat.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: mtchat-tls
  #    hosts:
  #      - chat.example.com

# -- PostgreSQL
postgresql:
  # Set to false to use an external database
  enabled: true

  image:
    repository: postgres
    tag: "17-alpine"

  auth:
    database: mtchat
    username: mtchat
    # password is set via existingSecret or generated
    password: ""
    existingSecret: ""
    secretKeys:
      userPasswordKey: password

  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Connection settings for external database
  # Only used when postgresql.enabled=false
  external:
    host: ""
    port: 5432
    database: mtchat
    username: mtchat
    existingSecret: ""
    secretKeys:
      passwordKey: password

# -- Redis
redis:
  # Set to false to use an external Redis
  enabled: true

  image:
    repository: redis
    tag: "7-alpine"

  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

  # Connection settings for external Redis
  external:
    host: ""
    port: 6379
    existingSecret: ""
    secretKeys:
      urlKey: redis-url

# -- MinIO (S3-compatible storage)
minio:
  # Set to false to use external S3
  enabled: true

  image:
    repository: minio/minio
    tag: "latest"

  rootUser: mtchat-admin
  rootPassword: ""
  existingSecret: ""

  bucket: mtchat-attachments

  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # External S3 configuration (used when minio.enabled=false)
  external:
    endpoint: ""
    publicEndpoint: ""
    bucket: mtchat-attachments
    region: us-east-1
    existingSecret: ""
    secretKeys:
      accessKeyId: access-key-id
      secretAccessKey: secret-access-key

# -- Application secret.
#    Three ways to provide values:
#      1. Inline values below (dev/demo) — the chart creates a Secret.
#      2. `existingSecret: my-secret` — chart references an externally
#         managed Secret (ESO / Vault Agent Injector / sealed-secrets).
#      3. CI injection — pipelines pass the whole block via
#         `helm upgrade --set-json secret="${VAULT_JSON}"`.
secret:
  # Use an existing k8s Secret instead of creating one. When set, the
  # chart emits no Secret and reads all keys (see `keys:` below) from it.
  existingSecret: ""

  # Full connection URLs (when set, override the chart-built DATABASE_URL/REDIS_URL)
  databaseUrl: ""
  redisUrl: ""

  # App secrets
  jwtSecret: ""
  adminApiToken: ""
  webhookSecret: ""

  # S3 credentials for an external S3 bucket (e.g. Yandex Object Storage).
  # NOTE: these are client credentials only. The embedded MinIO admin user
  # is configured via `minio.rootUser` / `minio.rootPassword`.
  s3AccessKeyId: ""
  s3SecretAccessKey: ""

  # Password for the embedded PostgreSQL chart (when postgresql.enabled=true)
  postgresql:
    password: ""

  # Keys inside the Secret. Override these to match an externally managed
  # Secret's key naming when using `existingSecret`.
  keys:
    databaseUrl: DATABASE_URL
    redisUrl: REDIS_URL
    jwtSecret: JWT_SECRET
    adminApiToken: ADMIN_API_TOKEN
    webhookSecret: WEBHOOK_SECRET
    s3AccessKeyId: S3_ACCESS_KEY_ID
    s3SecretAccessKey: S3_SECRET_ACCESS_KEY

# -- CORS settings
cors:
  # Allowed origins (comma-separated or "*" for all)
  allowedOrigins: "*"
  # Allowed methods
  allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
  # Allowed headers
  allowedHeaders: "*"
  # Allow credentials (cookies, auth headers)
  allowCredentials: false
  # Preflight cache max age (seconds)
  maxAge: 3600

# -- Webhooks (optional)
webhooks:
  url: ""
  secret: ""

# -- Job queue settings
jobs:
  notificationDelaySecs: 30
  notificationConcurrency: 2
  archiveCron: "0 */5 * * * *"
  archiveAfterSecs: 259200

# -- Sentry (optional)
sentry:
  dsn: ""

# -- Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

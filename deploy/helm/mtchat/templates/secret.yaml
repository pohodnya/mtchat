{{- /*
Application Secret. Created only when at least one `secret.*` field is
populated AND `existingSecret` is not set. When `existingSecret`
is provided, the chart references that Secret (managed externally by
ESO / Vault Agent / CI `--set-json`) and emits no Secret of its own.
*/ -}}
{{- if and (not .Values.existingSecret) (or .Values.secret.DATABASE_URL .Values.secret.REDIS_URL .Values.secret.JWT_SECRET .Values.secret.ADMIN_API_TOKEN .Values.secret.WEBHOOK_SECRET .Values.secret.S3_ACCESS_KEY_ID .Values.secret.S3_SECRET_ACCESS_KEY) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mtchat.secretName" . }}
  labels:
    {{- include "mtchat.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secret.DATABASE_URL }}
  DATABASE_URL: {{ .Values.secret.DATABASE_URL | quote }}
  {{- end }}
  {{- if .Values.secret.REDIS_URL }}
  REDIS_URL: {{ .Values.secret.REDIS_URL | quote }}
  {{- end }}
  {{- if .Values.secret.JWT_SECRET }}
  JWT_SECRET: {{ .Values.secret.JWT_SECRET | quote }}
  {{- end }}
  {{- if .Values.secret.ADMIN_API_TOKEN }}
  ADMIN_API_TOKEN: {{ .Values.secret.ADMIN_API_TOKEN | quote }}
  {{- end }}
  {{- if .Values.secret.WEBHOOK_SECRET }}
  WEBHOOK_SECRET: {{ .Values.secret.WEBHOOK_SECRET | quote }}
  {{- end }}
  {{- if .Values.secret.S3_ACCESS_KEY_ID }}
  S3_ACCESS_KEY_ID: {{ .Values.secret.S3_ACCESS_KEY_ID | quote }}
  {{- end }}
  {{- if .Values.secret.S3_SECRET_ACCESS_KEY }}
  S3_SECRET_ACCESS_KEY: {{ .Values.secret.S3_SECRET_ACCESS_KEY | quote }}
  {{- end }}
{{- end }}
{{- if and .Values.postgresql.enabled (not .Values.postgresql.auth.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mtchat.fullname" . }}-postgresql
  labels:
    {{- include "mtchat.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $pgPassword := .Values.postgresqlPassword | default .Values.postgresql.auth.password | default (randAlphaNum 24) }}
  {{ .Values.postgresql.auth.secretKeys.userPasswordKey }}: {{ $pgPassword | quote }}
  DATABASE_URL: "postgres://{{ include "mtchat.postgresql.username" . }}:{{ $pgPassword }}@{{ include "mtchat.postgresql.host" . }}:{{ include "mtchat.postgresql.port" . }}/{{ include "mtchat.postgresql.database" . }}"
{{- end }}
{{- if and .Values.minio.enabled (not .Values.minio.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mtchat.fullname" . }}-minio
  labels:
    {{- include "mtchat.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $minioPassword := .Values.minio.rootPassword | default (randAlphaNum 24) }}
  root-user: {{ .Values.minio.rootUser | quote }}
  root-password: {{ $minioPassword | quote }}
  S3_ACCESS_KEY_ID: {{ .Values.minio.rootUser | quote }}
  S3_SECRET_ACCESS_KEY: {{ $minioPassword | quote }}
{{- end }}

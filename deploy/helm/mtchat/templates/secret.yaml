{{- /*
Unified app secret (CI/Vault-friendly). Created only when at least one
`secret.*` field is populated and `secret.existingSecret` is not set.
*/ -}}
{{- if and (not .Values.secret.existingSecret) (or .Values.secret.databaseUrl .Values.secret.redisUrl .Values.secret.jwtSecret .Values.secret.adminApiToken .Values.secret.webhookSecret .Values.secret.s3AccessKeyId .Values.secret.s3SecretAccessKey) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mtchat.appSecretName" . }}
  labels:
    {{- include "mtchat.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secret.databaseUrl }}
  {{ .Values.secret.keys.databaseUrl }}: {{ .Values.secret.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.secret.redisUrl }}
  {{ .Values.secret.keys.redisUrl }}: {{ .Values.secret.redisUrl | quote }}
  {{- end }}
  {{- if .Values.secret.jwtSecret }}
  {{ .Values.secret.keys.jwtSecret }}: {{ .Values.secret.jwtSecret | quote }}
  {{- end }}
  {{- if .Values.secret.adminApiToken }}
  {{ .Values.secret.keys.adminApiToken }}: {{ .Values.secret.adminApiToken | quote }}
  {{- end }}
  {{- if .Values.secret.webhookSecret }}
  {{ .Values.secret.keys.webhookSecret }}: {{ .Values.secret.webhookSecret | quote }}
  {{- end }}
  {{- if .Values.secret.s3AccessKeyId }}
  {{ .Values.secret.keys.s3AccessKeyId }}: {{ .Values.secret.s3AccessKeyId | quote }}
  {{- end }}
  {{- if .Values.secret.s3SecretAccessKey }}
  {{ .Values.secret.keys.s3SecretAccessKey }}: {{ .Values.secret.s3SecretAccessKey | quote }}
  {{- end }}
{{- end }}
{{- /*
Legacy app secret (kept for backward compatibility with the `secrets.*` block).
Only emitted when the legacy block is in use and the unified one is not.
*/ -}}
{{- if and (not .Values.secrets.existingSecret) (or .Values.secrets.jwtSecret .Values.secrets.adminApiToken) }}
{{- if not (or .Values.secret.databaseUrl .Values.secret.redisUrl .Values.secret.jwtSecret .Values.secret.adminApiToken .Values.secret.webhookSecret .Values.secret.s3AccessKeyId .Values.secret.s3SecretAccessKey) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mtchat.secretName" . }}
  labels:
    {{- include "mtchat.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.jwtSecret }}
  {{ .Values.secrets.secretKeys.jwtSecretKey }}: {{ .Values.secrets.jwtSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.adminApiToken }}
  {{ .Values.secrets.secretKeys.adminApiTokenKey }}: {{ .Values.secrets.adminApiToken | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- if and .Values.postgresql.enabled (not .Values.postgresql.auth.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mtchat.fullname" . }}-postgresql
  labels:
    {{- include "mtchat.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.postgresql.auth.secretKeys.userPasswordKey }}: {{ .Values.secret.postgresql.password | default .Values.postgresql.auth.password | default (randAlphaNum 24) | quote }}
{{- end }}
{{- if and .Values.minio.enabled (not .Values.minio.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mtchat.fullname" . }}-minio
  labels:
    {{- include "mtchat.labels" . | nindent 4 }}
type: Opaque
stringData:
  root-user: {{ .Values.minio.rootUser | quote }}
  root-password: {{ .Values.minio.rootPassword | default (randAlphaNum 24) | quote }}
{{- end }}

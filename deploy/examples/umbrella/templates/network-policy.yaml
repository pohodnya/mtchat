{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-mtchat-api
  labels:
    {{- include "mtchat-deployment.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mtchat-deployment.apiSelector" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.allowedNamespace | quote }}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Permit all egress so the API can reach the database, Redis, S3 and
    # any external auth/webhook endpoints. Tighten in environments that
    # require strict egress control.
    - {}
{{- end }}

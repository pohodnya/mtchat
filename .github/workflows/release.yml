# =============================================================================
# MTChat Release - Triggered by version tags (v*)
# =============================================================================
#
# Workflow:
#   1. Build & push Docker image to DockerHub
#   2. Publish @mtchat/vue to npm
#   3. Publish @mtchat/vue-primevue to npm
#   4. Generate changelog & create GitHub Release
#   5. Build & deploy documentation to GitHub Pages
#
# Trigger: push tag matching v* (e.g. v0.1.0, v1.0.0)
#
# Required secrets:
#   DOCKERHUB_USERNAME  - DockerHub username
#   DOCKERHUB_TOKEN     - DockerHub access token
#   NPM_TOKEN           - npm publish token (for @mtchat scope)
#
# =============================================================================
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

env:
  DOCKER_IMAGE: pohodnya/mtchat
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================================================
  # Validate: run tests before releasing
  # ===========================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mtchat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      # Rust checks
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mtchat-rust
      - run: cargo fmt --manifest-path mtchat-rust/Cargo.toml --check
      - run: cargo clippy --manifest-path mtchat-rust/Cargo.toml -- -D warnings
      - run: cargo test --manifest-path mtchat-rust/Cargo.toml --lib
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/mtchat_test
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/mtchat_test
        run: cargo test --manifest-path mtchat-rust/Cargo.toml --tests

      # Vue SDK checks
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: mtchat-vue
      - run: npm run typecheck
        working-directory: mtchat-vue
      - run: npm run build
        working-directory: mtchat-vue

  # ===========================================================================
  # Docker: build per-platform images on native runners (no QEMU)
  # ===========================================================================
  docker-build:
    name: Docker Build (${{ matrix.platform }})
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (labels only)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_IMAGE }}
            ghcr.io/${{ github.repository }}/backend

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./mtchat-rust
          file: ./mtchat-rust/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,"name=${{ env.DOCKER_IMAGE }},ghcr.io/${{ github.repository }}/backend",push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=gha,scope=docker-${{ matrix.arch }}
            type=registry,ref=ghcr.io/${{ github.repository }}/backend:cache-${{ matrix.arch }}
          cache-to: |
            type=gha,scope=docker-${{ matrix.arch }},mode=max
            type=registry,ref=ghcr.io/${{ github.repository }}/backend:cache-${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ===========================================================================
  # Docker: merge per-arch digests into multi-arch manifest
  # ===========================================================================
  docker:
    name: Docker Image
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_IMAGE }}
            ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest

      - name: Create manifest list and push (DockerHub)
        working-directory: /tmp/digests
        env:
          REGISTRY_IMAGE: ${{ env.DOCKER_IMAGE }}
        run: |
          tags=$(jq -cr '.tags | map(select(startswith("ghcr.io") | not)) | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools create $tags \
            $(printf "${REGISTRY_IMAGE}@sha256:%s " *)

      - name: Create manifest list and push (GHCR)
        working-directory: /tmp/digests
        env:
          REGISTRY_IMAGE: ghcr.io/${{ github.repository }}/backend
        run: |
          tags=$(jq -cr '.tags | map(select(startswith("ghcr.io"))) | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools create $tags \
            $(printf "${REGISTRY_IMAGE}@sha256:%s " *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.version }}

  # ===========================================================================
  # Helm: package the chart and push to GHCR as an OCI artifact
  # ===========================================================================
  helm-publish:
    name: Publish Helm Chart
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Set chart version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/mtchat/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/mtchat/Chart.yaml
          echo "--- Chart.yaml ---"
          cat deploy/helm/mtchat/Chart.yaml

      - name: Helm lint
        run: helm lint deploy/helm/mtchat

      - name: Helm package
        run: |
          mkdir -p /tmp/helm-charts
          helm package deploy/helm/mtchat -d /tmp/helm-charts

      - name: Login to GHCR (Helm OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OWNER="${{ github.repository_owner }}"
          OWNER_LOWER="${OWNER,,}"
          helm push "/tmp/helm-charts/mtchat-${VERSION}.tgz" "oci://ghcr.io/${OWNER_LOWER}/charts"

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: /tmp/helm-charts/mtchat-*.tgz
          if-no-files-found: error
          retention-days: 7

  # ===========================================================================
  # npm: publish @mtchat/vue
  # ===========================================================================
  npm-vue:
    name: Publish @mtchat/vue
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mtchat-vue
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Check if version exists
        id: check
        run: |
          if npm view @mtchat/vue@${GITHUB_REF_NAME#v} version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set version from tag
        if: steps.check.outputs.exists == 'false'
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: npm ci
      - run: npm run build

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ===========================================================================
  # npm: publish @mtchat/vue-primevue
  # ===========================================================================
  npm-primevue:
    name: Publish @mtchat/vue-primevue
    needs: npm-vue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Check if version exists
        id: check
        run: |
          if npm view @mtchat/vue-primevue@${GITHUB_REF_NAME#v} version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set version from tag
        if: steps.check.outputs.exists == 'false'
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
        working-directory: mtchat-vue-primevue

      # Build base SDK first (needed for file: dependency)
      - run: npm ci
        working-directory: mtchat-vue
      - run: npm run build
        working-directory: mtchat-vue

      # Build and publish primevue wrapper
      - run: npm ci
        working-directory: mtchat-vue-primevue
      - run: npm run build
        working-directory: mtchat-vue-primevue

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        run: npm publish --access public
        working-directory: mtchat-vue-primevue
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ===========================================================================
  # GitHub Release with changelog
  # ===========================================================================
  github-release:
    name: GitHub Release
    needs: [docker, helm-publish, npm-vue, npm-primevue]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Helm chart artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: /tmp/helm-charts

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -n 2 | tail -n 1)

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            # First release - show all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..${GITHUB_REF_NAME}")
          fi

          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -iE "^- (feat|add|new)" || true)
          FIXES=$(echo "$COMMITS" | grep -iE "^- (fix|bug|patch)" || true)
          REFACTOR=$(echo "$COMMITS" | grep -iE "^- (refactor|chore|style|ci|docs)" || true)
          OTHER=$(echo "$COMMITS" | grep -viE "^- (feat|add|new|fix|bug|patch|refactor|chore|style|ci|docs)" || true)

          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$REFACTOR" ]; then
              echo "### Other Changes"
              echo "$REFACTOR"
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo "$OTHER"
              echo ""
            fi
            echo "---"
            echo ""
            echo "### Packages"
            echo "- Docker: \`docker pull ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}\`"
            echo "- Helm: \`helm pull oci://ghcr.io/${{ github.repository_owner }}/charts/mtchat --version ${{ steps.version.outputs.version }}\`"
            echo "- npm: \`npm install @mtchat/vue@${{ steps.version.outputs.version }}\`"
            echo "- npm: \`npm install @mtchat/vue-primevue@${{ steps.version.outputs.version }}\`"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: /tmp/helm-charts/mtchat-*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Documentation: build and deploy to GitHub Pages
  # ===========================================================================
  docs:
    name: Deploy Documentation
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install --upgrade mkdocs-material mkdocs-static-i18n

      - name: Build documentation
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
